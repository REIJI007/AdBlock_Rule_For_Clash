name: Cleanup All Runner Logs

# 手动触发或定期触发此清理任务
on:
  workflow_dispatch: # 手动触发workflow
  schedule:          # 定时触发任务（每天执行一次）
    - cron: '0 0 * * *'

jobs:
  cleanup_logs:
    runs-on: ubuntu-latest

    steps:
      # 删除 GitHub Actions Runner 中的所有日志文件
      - name: Cleanup all runner logs
        run: |
          echo "Cleaning up all runner logs in /home/runner/runners/_diag..."
          sudo rm -rf /home/runner/runners/**/_diag/*.log
          echo "Runner logs cleanup completed."

      # 可选：删除更多的临时或不必要的文件
      - name: Cleanup temporary files and cache (optional)
        run: |
          echo "Cleaning up /tmp directory and apt cache..."
          sudo rm -rf /tmp/*
          sudo apt-get clean
